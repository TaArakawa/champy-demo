<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- ChamPy ロゴのマーク(モンスターボール風リング + 白い P)を再現した favicon -->
  <defs>
    <linearGradient id="ball" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c4f57"/>
      <stop offset="0.44" stop-color="#1c4f57"/>
      <stop offset="0.44" stop-color="#3fd6e8"/>
      <stop offset="0.56" stop-color="#3fd6e8"/>
      <stop offset="0.56" stop-color="#0c0f13"/>
      <stop offset="1" stop-color="#0c0f13"/>
    </linearGradient>
  </defs>
  <!-- ボール本体 -->
  <circle cx="24" cy="24" r="21.5" fill="url(#ball)" stroke="#3fd6e8" stroke-width="3"/>
  <!-- 下半分のリムを少し暗く(ロゴの borderBottomColor 相当) -->
  <path d="M45.5 24 A21.5 21.5 0 0 1 2.5 24" fill="none" stroke="#1a5560" stroke-width="3" stroke-linecap="round"/>
  <!-- 白い P -->
  <text x="24" y="25" text-anchor="middle" dominant-baseline="central"
        font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="27"
        fill="#ffffff" stroke="#062a30" stroke-width="1" paint-order="stroke"
        style="paint-order:stroke">P</text>
</svg>
